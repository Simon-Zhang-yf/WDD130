<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body{
            background-color: #E8ECED;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0%;
        }
        h1{
            text-align: center;
            color: white;
        }
        h2{
            color: white;
            text-align: center;
        }
        section{
            text-align: center;
        }
        #outside-div{
            position: relative;
            margin-left: 25%;
            margin-right: 25%;
            margin-top: 30px;
            margin-bottom: 30px;
            border: 8px solid black;
            border-radius: 25px;
            overflow: hidden;
            padding-bottom: 30px;
        }
        .img-background{
            position: absolute;
            z-index: -1;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #top-section{
            display: grid;
            grid-template-columns: repeat(3, 150px);
            justify-content: center;
            justify-items: center;
            column-gap: 18px;
        }
        .img-top{
            border: 10px solid white ;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            transition: transform .5s;
            margin: 10px;
        }
        .img-top:hover {
            opacity: .8;
            transform: scale(1.1);
        }
        #bot-section{
            display: grid;
            grid-template-columns: repeat(4, 95px);
            grid-template-rows: repeat(3, 95px);
            justify-content: center;
            justify-items: center;
            gap: 30px 15px;
        }
        .img-bot{
            text-align: center;
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 7px solid white ;
            border-radius: 50%;
            transition: transform .5s;
        }
        .img-bot:hover {
            opacity: .9;
            transform: scale(1.1);
        } 
    </style>
</head>
<body>
    <div id = "outside-div">
        <img class="img-background" src="images/christus.webp" alt="Background picture">
        <div>
            <h1>
                First Presidency
            </h1>
            <section id = "top-section">
                <img class="img-top" src="images/eyring.webp" alt="a picture of Eyring">
                <img class="img-top" src="images/oaks.webp" alt="a picture of Oaks">
                <img class="img-top" src="images/christofferson.webp" alt="a picture of Christofferson">
            </section>
            <h2>
                Quorum of the Twelve Apostles
            </h2>
            <section id = "bot-section">
                <img class="img-bot" src="images/uchtdorf.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/bednar.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/cook.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/anderson.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/rasband.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/stevenson.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/renlund.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/gong.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/soares.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/kearon.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/causse.webp" alt="a picture of Eyring">
                <img class="img-bot" src="images/gilbert.webp" alt="a picture of Eyring">
            </section>
        </div>
    </div>
</body>
</html>
