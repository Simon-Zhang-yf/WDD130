<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallin H. Oaks</title>
    <style>
        /* Insert styles here, this is called an internal stylesheet  */
        body {
            background: #FFECD7;
        }
        h1{
            color: #FFFFFE;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        h2{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center; 
        }
        a{
            color: #91E4FB;
            text-decoration: none;
        }
        a:visited{
            color: #91E4FB;
            text-decoration: none;
        }
        ul{
            display: inline-block;
            text-align: left;
            color: #FFFFFE;
            font-family: Arial, Helvetica, sans-serif;
            margin-right: 10%;
        }
        p{
            color: #FFD783;
            font-family: "Brush Script MT";
            font-size: 1.2em;
            text-align: center;
        }
        #first-div{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }
        #second-div{
            background-color: #008DB1;
            border: 4px solid #004E63;
            text-align: center;
            grid-column: 2/3;
        }
        section{
            text-align: center;
        }
        .img{
            border: 4px solid white;
            max-width: 50%;
        }
    </style>
</head>
<body>
    <div id = "first-div">
        <div id = "second-div">
            <h1>
                Dallin H. Oaks
            </h1>
            <!-- <h2> -->
                <a href ="churchofjesuschrist.org">18th President of the Church of Jesus Christ of Latter-day Saints</a>
            <!-- </h2> -->
            <section>
                 <img class="img" src="images/oaks.webp" alt="a picture of Dallin H. Oaks">
            </section>
            <ul>
                <li>Born: Aug 12, 1932</li>
                <li>Apostle: Apr 7, 1984</li>
                <li>Prophet: Oct 14, 2025</li>
            </ul>
            <p>
                "The only permanent solution to the differences that divide us is for all of us to to follow our Savior's teachings."
            </p>
        </div>
    </div>
</body>
</html>
