<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #border{
            border: 10px rgba(19, 19, 121, 0.862) solid;
            border-radius: 5%;
            margin: 20px 25% 50px;
            overflow: hidden;
        }

        #jesus-christ{
            width: 100%;   
            display: block;
            height: 200px;
            object-fit: cover;
            object-position: top;
        }

        #formContainer {
            background-color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 0.1fr 1fr;
            text-align: center;
        }

        #book-area {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-column: 1 / 3;
            gap: 2px;
        }

        #book-area img {
            width: 100%;
            display: block;
        }

        #book1 {
            grid-column: 1 / 2;
        }
        #book2 {
            grid-column: 2 / 3;
        }

        #book3 {
            grid-column: 3 / 4;
        }

        #book4 {
            grid-column: 4 / 5;
        }

        #book5 {
            grid-column: 5 / 6;
        }

        h3 {
            grid-column: 1 / 3;
            grid-row: 1 / 2;
            margin: 0;

        }

        #over-lay {
            position: absolute;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        #myForm {
            display: grid;
            grid-template-columns: 0.5fr 1fr;
            grid-template-rows: repeat(7, 45px);
            grid-column: 1 / 3;
            margin: 10px;
        }

        .user-name-left {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        .user-name-right {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        #top {
            position: relative;
        }

        #closeBtn {
            background-color: white;
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: white;
            border: none;
            padding: 5px 10px;
        }

        #acknowledge {
            grid-row: 6 / 7;
            grid-column: 1 / 3;
        }

        #submit {
            grid-row: 7 / 8;
            grid-column: 1 / 3;
        }

        #subscribe {
            grid-row: 5 / 6;
            grid-column: 1 / 3;
        }

        label {
            text-align: left;
        }


    </style>
</head>

<body>
    <div id="border">
        <section id="top">
            <img id="jesus-christ" src="images/jesus_feeds_5000.jpeg" alt="jesus_feeds_5000" ></a>
            <button type="button" id="closeBtn">X</button>
            <div id="over-lay">
                <h1>Daily Feed</h1>
                <h1>Scripture a Day</h1>
            </div>
        </section>
        <div id="formContainer">
            <h3>Sign Up for Daily Scripture Feed</h3>
            <form id="myForm">
                <label class="user-name-left" for="username">User Name:</label>
                <input class="user-name-right" type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section id="subscribe">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section id="acknowledge">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section id="submit">
                    <button type="submit">Submit</button>
                </section>
            </form>
        <section id="book-area">
                <img id="book1" src="images/old_testament.webp" alt="old_testament" ></a>
                <img id="book2" src="images/new_testament.webp" alt="new_testament" ></a>
                <img id="book3" src="images/book_of_mormon.webp" alt="book_of_mormon" ></a>
                <img id="book4" src="images/doctrine_and_covenants.webp" alt="doctrine_and_covenants" ></a>
                <img id="book5" src="images/pearl_of_great_price.webp" alt="pearl_of_great_price" ></a>
        </section>
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
